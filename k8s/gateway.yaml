apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: gateway
  labels:
    app: gateway
    version: "v2"
spec:
  replicas: 5                          # need 5 for meaningful canary splits (20% = 1 pod)
  strategy:
    canary:
      steps:
        - setWeight: 20                 # 1 of 5 pods = canary
        - pause: {}                     # infinite pause — wait for manual promote
        - setWeight: 60                 # 3 of 5 pods = canary
        - pause: {duration: 30s}        # auto-proceed after 30s
        - setWeight: 100                # full rollout
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: quickticket-gateway:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: EVENTS_URL
              value: "http://events:8081"
            - name: PAYMENTS_URL
              value: "http://payments:8082"
            - name: GATEWAY_TIMEOUT_MS
              value: "5000"
            - name: APP_VERSION
              value: "v1"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 5
            failureThreshold: 2
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
spec:
  type: ClusterIP
  selector:
    app: gateway
  ports:
    - port: 8080
      targetPort: 8080
